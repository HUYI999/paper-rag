# 论文检索 RAG 系统配置（由 setup.py 生成）

llm:
  provider: "openai"
  model: "gpt-4o"
  deployment_name: ""
  azure_endpoint: ""
  api_version: ""
  api_key: ""
  base_url: ""
  temperature: 0.0
  max_tokens: 4096

embedding:
  provider: "openai"
  model: "text-embedding-ada-002"
  dimensions: 1536
  azure_endpoint: ""
  deployment_name: ""
  api_version: ""
  api_key: ""
  base_url: ""

vision_llm:
  enabled: true
  provider: "openai"
  model: "gpt-4o"
  azure_endpoint: ""
  deployment_name: ""
  api_version: ""
  api_key: ""
  max_image_size: 2048

vector_store:
  provider: "chroma"
  persist_directory: "./data/db/chroma"
  collection_name: "papers"

retrieval:
  dense_top_k: 20
  sparse_top_k: 20
  fusion_top_k: 10
  rrf_k: 60

rerank:
  enabled: true
  provider: "cross_encoder"
  model: "cross-encoder/ms-marco-MiniLM-L-6-v2"
  top_k: 5

evaluation:
  enabled: false
  provider: "custom"
  metrics:
    - "hit_rate"
    - "mrr"
    - "faithfulness"

observability:
  log_level: "INFO"
  trace_enabled: true
  trace_file: "./logs/traces.jsonl"
  structured_logging: true

ingestion:
  chunk_size: 1000
  chunk_overlap: 200
  splitter: "recursive"
  batch_size: 100
  chunk_refiner:
    use_llm: false
  metadata_enricher:
    use_llm: false
